name: RAG Evaluation Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run RAGAS Evaluation Gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          # Check threshold for faithfulness
          python -c "import json; summary = json.load(open('phase-a/ragas_summary.json')); f = summary.get('faithfulness', summary.get('mean_faithfulness', 0)); print(f'Faithfulness: {f}'); exit(0 if f >= 0.7 else 1)"

      - name: Upload Evaluation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-evaluation-results
          path: |
            phase-a/ragas_results.csv
            phase-a/ragas_summary.json
            phase-a/failure_analysis.md
